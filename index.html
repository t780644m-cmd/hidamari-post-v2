<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひだまりポスト</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>☀️ ひだまりポスト</h1>
  <p>やさしい気持ちを届けよう</p>
</header>

<main>

<section class="intro">
  <h2>📮 みんなのメッセージ</h2>
  <p>
    友だちへのありがとう<br>
    がんばっている人への応援<br>
    うれしかったこと<br>
    小さな発見
  </p>
</section>

<section class="post">

<h2>✏️ メッセージを書く</h2>

<input id="name" placeholder="名前を書こう">

<textarea id="message" placeholder="メッセージを書こう"></textarea>

<button onclick="addPost()">📮 ポストに入れる</button>

</section>


<section>
<h2>🌻 届いたメッセージ</h2>

<div id="posts">
</div>

</section>


<script src="script.js"></script>

</main>

<footer>
  <p>ひだまりポスト</p>
</footer>

</body>
</html>
